<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #4f46e5;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👋 Hello World</h1>
    <p>Welcome to your prototype homepage.</p>

    <button onclick="sayHello()">
      Click Me
    </button>
  </div>

  <script>
    function sayHello() {
      alert("Hello from your website!");
    }
  </script>
</body>
</html>
